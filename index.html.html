  <input id="answer" placeholder="請輸入英文">
  <button class="next" onclick="submitAnswer()">下一題</button>
  <button class="review" onclick="reviewWrong()">📚 複習錯題</button>

];

let questions = [];
let wrong = [];
let index = 0;
let score = 0;
let wrongCount = JSON.parse(localStorage.getItem("wrongCount")||"{}");

function shuffle(arr){ return arr.sort(()=>0.5-Math.random()); }

function start(){
  if(bank.length === 0){
    alert("題庫是空的！");
    return;
  }
  questions = shuffle([...bank]).slice(0,10);
  wrong = [];
  index = 0;
  score = 0;
  load();
}

function load(){
  if(!questions || questions.length === 0) return;

  if(index < questions.length){
    document.getElementById("qnum").innerText = `第 ${index+1} 題 / ${questions.length}`;
    document.getElementById("question").innerText = questions[index].q;
    document.getElementById("answer").value = "";
  } else {
    localStorage.setItem("wrongWords", JSON.stringify(wrong));
    localStorage.setItem("wrongCount", JSON.stringify(wrongCount));
    document.getElementById("question").innerText = "完成！";
  }
}

function speakWord(){
  let u = new SpeechSynthesisUtterance(questions[index].a);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function submitAnswer(){
  let ans = document.getElementById("answer").value.trim().toLowerCase();
  let correct = questions[index].a;

  if(ans === correct){
    score++;
  } else {
    wrong.push(questions[index]);
    wrongCount[correct] = (wrongCount[correct] || 0) + 1;
  }

  index++;
  load();
}

function reviewWrong(){
  let saved = localStorage.getItem("wrongWords");
  if(saved){
    questions = JSON.parse(saved);
    if(questions.length === 0){
      alert("目前沒有錯題");
      return;
    }
    index = 0;
    wrong = [];
    load();
  }
}

function showRanking(){
  let sorted = Object.entries(wrongCount).sort((a,b)=>b[1]-a[1]);
  let html = "<h3>🔥 錯最多排行榜</h3>";
  sorted.slice(0,10).forEach((item,i)=>{
    html += `<div>${i+1}. ${item[0]}（${item[1]}次）</div>`;
  });
  document.getElementById("ranking").innerHTML = html;
}

// 🔥 保證載入成功
window.onload = start;
